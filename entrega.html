<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrega - Pollo Frito</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #b30000, #ff1a1a);
        }

        /* Caja principal */
        .entrega-box {
            width: 360px;
            margin: 60px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* Título */
        h1 {
            color: #b30000;
            margin-bottom: 15px;
        }

        /* Labels */
        label {
            display: block;
            text-align: left;
            margin-top: 12px;
            font-weight: bold;
        }

        /* Inputs */
        select, input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        /* Botón */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: #ff1a1a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="entrega-box">

    <h1>🍗 ENTREGA</h1>

    <form action="pago.html" method="GET">

        <label>Departamento:</label>
        <select name="departamento"> 
            <option value="lima">Lima</option>
            <option value="callao">Callao</option>
        </select>

        <label>Provincia:</label>
        <select name="provincia">
            <option value="lima">Lima</option>
        </select>

        <label>Distrito:</label>
        <select name="distrito">
            <option value="brena">Breña</option>
            <option value="chorrillos">Chorrillos</option>
            <option value="ves">Villa El Salvador</option>
            <option value="sjl">San Juan de Lurigancho</option>
            <option value="comas">Comas</option>
            <option value="barranco">Barranco</option>
            <option value="miraflores">Miraflores</option>
            <option value="surco">Surco</option>
            <option value="sanborja">San Borja</option>
            <option value="lavictoria">La Victoria</option>
            <option value="lamolina">La Molina</option>
            <option value="carabayllo">Carabayllo</option>
            <option value="magdalena">Magdalena del Mar</option>
            <option value="sanisidro">San Isidro</option>
        </select>

        <label>Dirección:</label>
        <input type="text" name="direccion" placeholder="Dirección*" required>

        <label>Referencia:</label>
        <textarea name="referencia" rows="4" placeholder="Ej: Casa azul, portón negro"></textarea>

        <button type="submit">Siguiente</button>

    </form>

</div>

</body>
</html>
