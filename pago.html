<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #b30000, #ff1a1a);
        }

        /* Caja principal */
        .pago-box {
            width: 360px;
            margin: 50px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* Título */
        h1 {
            color: #b30000;
            margin-bottom: 15px;
        }

        img {
            margin-bottom: 15px;
            border-radius: 10px;
        }

        /* Labels */
        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* Fila (para agrupar campos) */
        .fila {
            display: flex;
            gap: 10px;
        }

        .fila select, .fila input {
            width: 100%;
        }

        /* Botón */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: #ff1a1a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="pago-box">

    <h1>💳 PAGO</h1>

    <img src="pago.png" width="100%">

    <form action="index.html" method="GET">

        <label>Número de tarjeta:</label>
        <input type="number" placeholder="Número de tarjeta*" required>

        <label>Fecha de expiración:</label>
        <div class="fila">
            <select required>
                <option value="">Mes</option>
                <option>Enero</option>
                <option>Febrero</option>
                <option>Marzo</option>
                <option>Abril</option>
                <option>Mayo</option>
                <option>Junio</option>
                <option>Julio</option>
                <option>Agosto</option>
                <option>Septiembre</option>
                <option>Octubre</option>
                <option>Noviembre</option>
                <option>Diciembre</option>
            </select>

            <select required>
                <option value="">Año</option>
                <option>2026</option>
                <option>2027</option>
                <option>2028</option>
                <option>2029</option>
                <option>2030</option>
                <option>2031</option>
            </select>
        </div>

        <label>CVV:</label>
        <input type="password" placeholder="CVV*" required>

        <label>Nombre del titular:</label>
        <input type="text" placeholder="Nombre del titular" required>

        <label>Tipo de documento:</label>
        <div class="fila">
            <select>
                <option>DNI</option>
                <option>C.E</option>
                <option>RUC</option>
            </select>

            <input type="number" placeholder="Número de documento*" required>
        </div>

        <button type="submit">Finalizar</button>

    </form>

</div>

</body>
</html>
